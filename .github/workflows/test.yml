name: Test project
on: push

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Get code
              uses: actions/checkout@v7

            - name: Install NodeJS
              uses: actions/setup-node@v6
              with:
                node-version: 18

            - name: Install dependencies
              run: npm ci
              
            - name: Run tests
              run: npm test